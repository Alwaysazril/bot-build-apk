
name: Remote Build APK
on:
  push:
    branches: [ "main" ] # Memicu build tiap kali bot melakukan push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - name: Send APK to Telegram
        run: |
          curl -v -F "chat_id=5914076434" \
               -F "document=@build/app/outputs/flutter-apk/app-release.apk" \
               https://api.telegram.org/8434117840:AAGyQrdg6U8_kVv8W5PIwfc6azxMJahDpfg/sendDocument
