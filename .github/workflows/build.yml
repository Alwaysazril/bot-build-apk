name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f "project.zip" ]; then
            unzip -o project.zip
          else
            echo "Error: project.zip tidak ditemukan!"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # Versi Java 11 lebih cocok untuk Flutter 2.x

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '2.10.5' # Menggunakan versi lama agar support v1 embedding
          channel: 'stable'

      - name: Get Dependencies
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "Error: pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          cd "$PROJECT_ROOT"
          flutter pub get

      - name: Build APK Release
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          # Menggunakan --no-sound-null-safety jika proyek Anda sangat lama
          flutter build apk --release --no-sound-null-safety

      - name: Send APK to Telegram
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "release" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: File APK tidak ditemukan!"
            exit 1
          fi
          
          curl -F document=@"$APK_PATH" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F "caption=✅ **Build Selesai (Legacy Mode)!**%0A%0A📦 Proyek lama berhasil dikonversi.%0A⚡ Build by Web2Apk Azril"
