name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f "project.zip" ]; then
            echo "Mengekstrak project.zip..."
            unzip -o project.zip
          else
            echo "Error: project.zip tidak ditemukan di repository!"
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          # Cari folder yang berisi pubspec.yaml (antisipasi jika zip berisi subfolder)
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$PROJECT_ROOT" ]; then
            echo "Error: pubspec.yaml tidak ditemukan di dalam ZIP!"
            exit 1
          fi
          cd "$PROJECT_ROOT"
          flutter pub get

      - name: Build APK Release
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          flutter build apk --release

      - name: Send APK to Telegram
        run: |
          # Mencari file APK secara dinamis
          APK_PATH=$(find . -name "app-release.apk" | head -n 1)
          
          if [ -z "$APK_PATH" ]; then
            echo "Error: File APK tidak ditemukan!"
            exit 1
          fi
          
          curl -F document=@"$APK_PATH" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F "caption=✅ **Build Selesai!**%0A%0A📦 File: app-release.apk%0A⚡ Build by Web2Apk Azril"
