name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
            rm project.zip
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Build APK Release
        run: |
          # 1. Masuk ke folder project
          FLUTTER_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$FLUTTER_ROOT"

          # 2. Fix Manifest V2 (Sed murni, anti error)
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i 's/io.flutter.app.FlutterApplication/android.app.Application/g' "$MANIFEST"
            if ! grep -q "flutterEmbedding" "$MANIFEST"; then
              sed -i '/<activity/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST"
            fi
          fi

          # 3. Build APK
          flutter pub get
          flutter build apk --release

          # 4. Simpan path file
          APK_FILE=$(find build/app/outputs/flutter-apk/ -name "app-release.apk" | head -n 1)
          echo "FINAL_APK_PATH=$(pwd)/$APK_FILE" >> $GITHUB_ENV

      - name: Send APK to Telegram
        if: success()
        run: |
          curl -v -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**%0A📦 APK siap diunduh."

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ **BUILD GAGAL!** Periksa log GitHub."
