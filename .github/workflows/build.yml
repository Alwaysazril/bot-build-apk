name: Flutter Build APK
on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK Release
        run: flutter build apk --release --no-tree-shake-icons

      - name: Get APK Info
        id: info
        run: |
          size=$(du -h build/app/outputs/flutter-apk/app-release.apk | cut -f1)
          echo "apk_size=$size" >> $GITHUB_OUTPUT

      - name: Send to Telegram
        run: |
          curl -F document=@"build/app/outputs/flutter-apk/app-release.apk" \
          -F caption="✅ **BUILD SELESAI!**
          
          📝 **Detail Info:**
          • **Tipe:** Release APK
          • **Arsitektur:** v7a, v8a, x86_64
          • **Ukuran:** ${{ steps.info.outputs.apk_size }}
          • **Status:** Signed & Optimized
          
          Silakan download file di atas." \
          https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&parse_mode=Markdown
