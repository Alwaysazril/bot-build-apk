name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: unzip -o project.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # UPGRADE KE 17 UNTUK FIX ERROR GROOVY JSON

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          flutter pub get

      - name: Build APK Release
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          
          # Hapus cache gradle lama agar tidak konflik
          cd android && ./gradlew clean && cd ..
          
          # Build APK tanpa flag null-safety yang sudah tidak didukung
          flutter build apk --release --ignore-deprecation
          
          echo "FINAL_APK_PATH=$(find $(pwd)/build/app/outputs/flutter-apk/ -name "*.apk" | grep "release" | head -n 1)" >> $GITHUB_ENV

      - name: Send APK to Telegram
        if: success()
        run: |
          curl -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**%0A%0A📦 Akhirnya mendarat juga!%0A⚡ Build by Azril"
