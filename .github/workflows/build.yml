name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
            rm project.zip
          else
            echo "Warning: project.zip not found."
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Build APK Release
        run: |
          # 1. Cari root project
          FLUTTER_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$FLUTTER_ROOT" ]; then echo "ERROR: pubspec.yaml tidak ditemukan!"; exit 1; fi
          cd "$FLUTTER_ROOT"

          # 2. FIX V2 EMBEDDING (Suntik paksa agar tidak error)
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # Ganti Application Name
            sed -i 's/io.flutter.app.FlutterApplication/android.app.Application/g' "$MANIFEST_PATH"
            # Hapus meta-data lama jika ada, lalu pasang yang baru (v2)
            sed -i '/flutterEmbedding/d' "$MANIFEST_PATH"
            sed -i '/<activity/a \            <meta-data android:name="flutterEmbedding" android:value="2" />' "$MANIFEST_PATH"
            echo "Manifest otomatis diperbaiki ke V2."
          fi

          # 3. Clean & Build
          flutter pub get
          cd android
          chmod +x gradlew
          ./gradlew clean
          cd ..
          flutter build apk --release

          # 4. Ambil Output
          FINAL_PATH=$(find build/app/outputs/flutter-apk/ -name "app-release.apk" | head -n 1)
          if [ -n "$FINAL_PATH" ]; then
            echo "FINAL_APK_PATH=$(pwd)/$FINAL_PATH" >> $GITHUB_ENV
          else
            echo "Build Gagal." && exit 1
          fi

      - name: Send APK to Telegram
        if: success()
        run: |
          curl -v -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**%0A📦 Project berhasil di-build ke APK."

      - name: Send Error Log
        if: failure()
        run: |
          echo "Build gagal, mengirim laporan..."
          # Opsional: Kirim pesan ke telegram jika gagal
          curl -s -X POST "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ **BUILD GAGAL!** Silakan cek log di GitHub Actions."
