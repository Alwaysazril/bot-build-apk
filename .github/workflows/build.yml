name: Remote Build APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Send APK to Telegram
        run: |
          # Mencari lokasi file APK secara otomatis agar tidak salah path
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
          
          curl -v -F "chat_id=5914076434" \
               -F "document=@$APK_PATH" \
               -F "caption=✅ Build Selesai!" \
               https://api.telegram.org/bot8434117840:AAGyQrdg6U8_kVv8W5PIwfc6azxMJahDpfg/sendDocument
