name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
            rm project.zip
          else
            echo "File project.zip tidak ditemukan di root."
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Build APK Release
        run: |
          # Cari lokasi pubspec.yaml
          FLUTTER_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$FLUTTER_ROOT" ]; then echo "Project Flutter tidak ditemukan!"; exit 1; fi
          cd "$FLUTTER_ROOT"

          # FIX V2 EMBEDDING (Gunakan Python agar aman dari error karakter)
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            python3 -c "
import os
path = '$MANIFEST_PATH'
with open(path, 'r') as f:
    data = f.read()
data = data.replace('io.flutter.app.FlutterApplication', 'android.app.Application')
if 'flutterEmbedding' not in data:
    data = data.replace('</activity>', '    <meta-data android:name=\"flutterEmbedding\" android:value=\"2\" />\n        </activity>')
with open(path, 'w') as f:
    f.write(data)
"
          fi

          flutter pub get
          cd android && chmod +x gradlew && ./gradlew clean && cd ..
          flutter build apk --release

          # Simpan path APK
          APK_FILE=$(find build/app/outputs/flutter-apk/ -name "app-release.apk" | head -n 1)
          echo "FINAL_APK_PATH=$APK_FILE" >> $GITHUB_ENV

      - name: Send APK to Telegram
        if: success()
        run: |
          curl -v -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**"

      - name: Notify Failure
        if: failure()
        run: |
          curl -s -X POST "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ **BUILD GAGAL!** Periksa log di GitHub."
