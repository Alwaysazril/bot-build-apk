name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
            rm project.zip
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Build APK Release
        run: |
          # 1. Cari root project
          FLUTTER_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$FLUTTER_ROOT"

          # 2. SCRIPT SAKTI: Fix Android Manifest v2 secara Aman
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            python3 -c "
import os
path = '$MANIFEST_PATH'
with open(path, 'r') as f:
    content = f.read()

# Ganti Application name
content = content.replace('io.flutter.app.FlutterApplication', 'android.app.Application')

# Tambahkan v2 embedding jika belum ada
if 'flutterEmbedding' not in content:
    # Sisipkan tepat sebelum tag penutup activity
    content = content.replace('</activity>', '    <meta-data android:name=\"flutterEmbedding\" android:value=\"2\" />\n        </activity>')

with open(path, 'w') as f:
    f.write(content)
"
            echo "✅ Manifest fixed successfully."
          fi

          # 3. Clean dan Build
          flutter pub get
          cd android && chmod +x gradlew && ./gradlew clean && cd ..
          flutter build apk --release

          # 4. Export Path
          FINAL_PATH=$(find build/app/outputs/flutter-apk/ -name "app-release.apk" | head -n 1)
          if [ -n "$FINAL_PATH" ]; then
            echo "FINAL_APK_PATH=$(pwd)/$FINAL_PATH" >> $GITHUB_ENV
          else
            echo "❌ Build failed: APK not found." && exit 1
          fi

      - name: Send APK to Telegram
        if: success()
        run: |
          curl -v -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**%0A📦 Project berhasil dikonversi ke APK."

      - name: Send Error Notification
        if: failure()
        run: |
          curl -s -X POST "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="❌ **BUILD GAGAL!**%0ASilakan cek log di GitHub Actions untuk detailnya."

