name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Update ke v4 lebih stabil

      - name: Setup Java
        uses: actions/setup-java@v4 # Update ke v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Dependencies
        # Menambahkan 'recursive' atau mencari folder yang ada pubspec.yaml
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          else
            cd $(find . -name "pubspec.yaml" -printf '%h' -quit)
            flutter pub get
          fi

      - name: Build APK Release
        run: |
          # Memastikan build berjalan di folder yang benar
          if [ -f "pubspec.yaml" ]; then
            flutter build apk --release
          else
            cd $(find . -name "pubspec.yaml" -printf '%h' -quit)
            flutter build apk --release
          fi

      - name: Send APK to Telegram
        run: |
          # Mencari file APK secara dinamis agar tidak error jika path berbeda
          APK_PATH=$(find build/app/outputs/flutter-apk/ -name "*.apk" | head -n 1)
          curl -F document=@"$APK_PATH" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&caption=✅ **Build Selesai!**%0A%0A📦 File: app-release.apk%0A⚡ Build by Web2Apk Azril"
