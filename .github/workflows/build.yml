name: Flutter Build APK

on:
repository_dispatch:
types: [telegram_build]

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Extract Project Zip
    run: unzip -o project.zip

  - name: Locate Project Root
    id: find_project
    run: |
      PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
      echo "PROJECT_ROOT=$PROJECT_ROOT" >> $GITHUB_ENV

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      flutter-version: '3.22.0'
      channel: 'stable'
      cache: true

  - name: Clean Gradle Cache (Fix Groovy Error)
    run: |
      rm -rf ~/.gradle/caches
      rm -rf ~/.gradle/wrapper

  - name: Get Dependencies
    run: |
      cd "$PROJECT_ROOT"
      flutter pub get

  - name: Fix Gradle Version (IMPORTANT)
    run: |
      cd "$PROJECT_ROOT/android"
      
      # Paksa pakai Gradle terbaru biar support JsonGenerator
      sed -i 's#distributionUrl=.*#distributionUrl=https\\://services.gradle.org/distributions/gradle-8.3-all.zip#g' gradle/wrapper/gradle-wrapper.properties

  - name: Build APK Release
    run: |
      cd "$PROJECT_ROOT"
      
      # Clean project
      flutter clean
      
      # Build APK
      flutter build apk --release
      
      APK_PATH=$(find build/app/outputs/flutter-apk/ -name "*release.apk" | head -n 1)
      echo "FINAL_APK_PATH=$APK_PATH" >> $GITHUB_ENV

  - name: Send APK to Telegram
    if: success()
    run: |
      curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
      -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
      -F document=@"${{ env.FINAL_APK_PATH }}" \
      -F caption="✅ BUILD SUKSES! 🚀"
```
