name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Dependencies
        run: |
          # Mencari lokasi pubspec.yaml secara otomatis
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ Error: pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          echo "✅ Project ditemukan di: $PUBSPEC_PATH"
          cd "$PUBSPEC_PATH"
          flutter pub get

      - name: Build APK Release
        run: |
          PUBSPEC_PATH=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PUBSPEC_PATH"
          flutter build apk --release

      - name: Send APK to Telegram
        run: |
          # Mencari file APK di folder build manapun
          APK_FILE=$(find . -name "app-release.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ Error: File APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ Mengirim APK: $APK_FILE"
          curl -F document=@"$APK_FILE" \
          "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&caption=✅ **Build Selesai!**%0A%0A📦 File: app-release.apk%0A⚡ Build by Web2Apk Azril"
