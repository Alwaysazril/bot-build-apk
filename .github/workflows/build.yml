name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: unzip -o project.zip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Kita balikkan ke versi stabil terbaru agar support project baru Anda
          flutter-version: '3.19.0' 
          channel: 'stable'

      - name: Get Dependencies
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          # Pakai --disable-telemetry agar lebih cepat
          flutter pub get || flutter pub get --stacktrace

      - name: Build APK Release
        run: |
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          
          # TRIK AMPUH: Jika error v1 embedding, kita paksa build tetap jalan
          flutter build apk --release --no-sound-null-safety --ignore-deprecation || \
          flutter build apk --release --ignore-deprecation

      - name: Send APK to Telegram
        if: success()
        run: |
          APK_PATH=$(find . -name "*.apk" | grep "release" | head -n 1)
          curl -F document=@"$APK_PATH" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F "caption=✅ **BUILD BERHASIL!**%0A%0A📦 File siap didownload.%0A⚡ Build by Azril"
