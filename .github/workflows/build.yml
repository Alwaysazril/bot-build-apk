name: Flutter Build APK

on:
  repository_dispatch:
    types: [telegram_build]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Project Zip
        run: |
          if [ -f project.zip ]; then
            unzip -o project.zip
            rm project.zip
          else
            echo "Warning: project.zip not found."
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Build APK Release
        run: |
          # 1. Cari root project Flutter
          FLUTTER_ROOT=$(find . -name "pubspec.yaml" -printf '%h' -quit)
          if [ -z "$FLUTTER_ROOT" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          cd "$FLUTTER_ROOT"

          # 2. FIX: Migrasi otomatis ke Android v2 Embedding
          # Mengganti FlutterApplication (v1) ke FlutterActivity (v2) di AndroidManifest.xml
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            sed -i 's/io.flutter.app.FlutterApplication/android.app.Application/g' "$MANIFEST_PATH"
            echo "Migrasi AndroidManifest.xml ke v2 selesai."
          fi

          # 3. Get Dependencies
          flutter pub get

          # 4. Clean Gradle
          GRADLEW_PATH=$(find . -name "gradlew" -printf '%p' -quit)
          if [ -n "$GRADLEW_PATH" ]; then
            chmod +x "$GRADLEW_PATH"
            cd $(dirname "$GRADLEW_PATH")
            ./gradlew clean
            cd ..
          fi

          # 5. Build APK
          flutter build apk --release

          # 6. Identifikasi Path APK
          FINAL_PATH=$(find build/app/outputs/flutter-apk/ -name "app-release.apk" | head -n 1)
          if [ -z "$FINAL_PATH" ]; then
             FINAL_PATH=$(find . -name "*.apk" | grep "release" | head -n 1)
          fi

          if [ -n "$FINAL_PATH" ]; then
            echo "FINAL_APK_PATH=$(pwd)/$FINAL_PATH" >> $GITHUB_ENV
          else
            echo "ERROR: File APK tidak ditemukan."
            exit 1
          fi

      - name: Send APK to Telegram
        if: success()
        run: |
          # Perbaikan URL Endpoint Telegram API
          curl -v -F document=@"${{ env.FINAL_APK_PATH }}" \
          "https://telegram.org{{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
          -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -F parse_mode="Markdown" \
          -F "caption=✅ **BUILD SUKSES!**%0A%0A📦 File APK siap diinstall."
